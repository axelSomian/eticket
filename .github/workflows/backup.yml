name: Backup base de données

on:
  schedule:
    - cron: '0 2 * * *'  # Chaque jour à 2h du matin (UTC)
  workflow_dispatch:       # Permet aussi de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Installer les outils PostgreSQL 17
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Exporter les tickets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          psql "$DATABASE_URL" -c "\COPY \"Ticket\" TO 'backups/tickets-${DATE}.csv' CSV HEADER"
          pg_dump "$DATABASE_URL" --table='"Ticket"' --data-only --no-owner --no-privileges -f "backups/tickets-${DATE}.sql"
          COUNT=$(wc -l < "backups/tickets-${DATE}.csv")
          echo "✓ Export OK — ${COUNT} lignes (headers inclus)"

      - name: Commit et push
        run: |
          git config user.email "backup-bot@gala"
          git config user.name "Backup Bot"
          git checkout backup 2>/dev/null || git checkout -b backup
          git add backups/
          git diff --staged --quiet && echo "Rien de nouveau à sauvegarder" || \
            (git commit -m "backup: tickets $(date +%Y-%m-%d)" && git push -u origin backup)
